name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

env:
  CARGO_TERM_COLOR: always
  CARGO_NET_RETRY: 10

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changelog:
    name: Generate Changelog
    runs-on: ubuntu-latest
    outputs:
      release_body: ${{ steps.changelog.outputs.release_body }}
      version: ${{ steps.version.outputs.version }}
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Get version from tag
      id: version
      run: |
        VERSION=${GITHUB_REF#refs/tags/}
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Version: $VERSION"
    
    - name: Generate changelog
      id: changelog
      run: |
        export VERSION="${{ steps.version.outputs.version }}"
        python3 scripts/generate_changelog.py > RELEASE_NOTES.md
        cat RELEASE_NOTES.md
        echo "release_body<<EOF" >> $GITHUB_OUTPUT
        cat RELEASE_NOTES.md >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

  build-release:
    name: Build Release (${{ matrix.name }})
    needs: changelog
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            name: linux-x86_64
            binary_name: image-viewer
            archive_ext: tar.gz
            archive_cmd: tar czvf
          
          - os: ubuntu-24.04-arm  # ARM64 原生 runner (GitHub beta)
            target: aarch64-unknown-linux-gnu
            name: linux-aarch64
            binary_name: image-viewer
            archive_ext: tar.gz
            archive_cmd: tar czvf
          
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: windows-x86_64
            binary_name: image-viewer.exe
            archive_ext: zip
            archive_cmd: 7z a
          
          - os: macos-latest
            target: x86_64-apple-darwin
            name: macos-x86_64
            binary_name: image-viewer
            archive_ext: tar.gz
            archive_cmd: tar czvf
          
          - os: macos-latest
            target: aarch64-apple-darwin
            name: macos-aarch64
            binary_name: image-viewer
            archive_ext: tar.gz
            archive_cmd: tar czvf

    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}
    
    - name: Install zig
      if: matrix.target == 'aarch64-unknown-linux-gnu'
      uses: goto-bus-stop/setup-zig@v2
      with:
        version: 0.11.0
    
    - name: Install cargo-zigbuild
      if: matrix.target == 'aarch64-unknown-linux-gnu'
      run: cargo install --locked cargo-zigbuild
    
    # ARM64 依赖由 Cross.toml 中指定的镜像提供
    
    - name: Install system dependencies (Ubuntu x86_64)
      if: runner.os == 'Linux' && matrix.target == 'x86_64-unknown-linux-gnu'
      run: |
        sudo apt-get update
        sudo apt-get install -y libgtk-3-dev libxcb-render0-dev libxcb-shape0-dev \
          libxcb-xfixes0-dev libxkbcommon-dev libssl-dev libxkbcommon-x11-dev \
          libfontconfig1-dev libfreetype6-dev libxcb1-dev libxrandr-dev \
          libxi-dev libxcursor-dev libx11-dev
    
    # cross 会通过 Cross.toml 自动安装 ARM64 依赖
    # - name: Install system dependencies (Ubuntu ARM64)
    #   if: matrix.target == 'aarch64-unknown-linux-gnu'
    #   run: echo "Dependencies handled by cross"
    
    - name: Install macOS dependencies
      if: runner.os == 'macOS'
      run: |
        brew install create-dmg || true
        xcode-select --print-path || xcode-select --install || true
    
    - name: Cache cargo
      uses: Swatinem/rust-cache@v2
      with:
        shared-key: "release-${{ matrix.target }}"
    
    - name: Fetch dependencies
      run: cargo fetch
    
    - name: Build release (x86_64 Linux/macOS/Windows)
      if: matrix.target != 'aarch64-unknown-linux-gnu'
      env:
        RUSTFLAGS: ${{ matrix.os == 'windows-latest' && '-C target-feature=+crt-static' || '' }}
      run: cargo build --release --target ${{ matrix.target }}
    
    - name: Install dependencies (ARM64 native)
      if: matrix.target == 'aarch64-unknown-linux-gnu'
      run: |
        sudo apt-get update
        sudo apt-get install -y libgtk-3-dev libfontconfig1-dev pkg-config
    
    - name: Build release (ARM64 Linux native)
      if: matrix.target == 'aarch64-unknown-linux-gnu'
      run: cargo build --release --target ${{ matrix.target }}
    
    - name: Package (Linux/Unix)
      if: matrix.archive_ext == 'tar.gz'
      run: |
        mkdir -p dist/image-viewer-${{ needs.changelog.outputs.version }}-${{ matrix.name }}
        cp target/${{ matrix.target }}/release/${{ matrix.binary_name }} dist/image-viewer-${{ needs.changelog.outputs.version }}-${{ matrix.name }}/
        cp README.md LICENSE dist/image-viewer-${{ needs.changelog.outputs.version }}-${{ matrix.name }}/
        # Copy platform-specific install scripts only (Windows)
        if [ "${{ matrix.name }}" = "linux-x86_64" ] || [ "${{ matrix.name }}" = "linux-aarch64" ]; then
          if [ -d "install/linux" ]; then
            mkdir -p dist/image-viewer-${{ needs.changelog.outputs.version }}-${{ matrix.name }}/install
            cp -r install/linux dist/image-viewer-${{ needs.changelog.outputs.version }}-${{ matrix.name }}/install/
          fi
        elif [ "${{ matrix.name }}" = "macos-x86_64" ] || [ "${{ matrix.name }}" = "macos-aarch64" ]; then
          if [ -d "install/macos" ]; then
            mkdir -p dist/image-viewer-${{ needs.changelog.outputs.version }}-${{ matrix.name }}/install
            cp -r install/macos dist/image-viewer-${{ needs.changelog.outputs.version }}-${{ matrix.name }}/install/
          fi
        fi
        cd dist
        ${{ matrix.archive_cmd }} ../image-viewer-${{ needs.changelog.outputs.version }}-${{ matrix.name }}.${{ matrix.archive_ext }} image-viewer-${{ needs.changelog.outputs.version }}-${{ matrix.name }}/
    
    - name: Package (Windows)
      if: matrix.archive_ext == 'zip'
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path "dist\image-viewer-${{ needs.changelog.outputs.version }}-${{ matrix.name }}"
        Copy-Item "target\${{ matrix.target }}\release\${{ matrix.binary_name }}" "dist\image-viewer-${{ needs.changelog.outputs.version }}-${{ matrix.name }}\"
        Copy-Item "README.md" "dist\image-viewer-${{ needs.changelog.outputs.version }}-${{ matrix.name }}\"
        Copy-Item "LICENSE" "dist\image-viewer-${{ needs.changelog.outputs.version }}-${{ matrix.name }}\"
        # Copy platform-specific install scripts only (Windows)
        if (Test-Path "install\windows") {
          Copy-Item -Recurse -Path "install\windows" -Destination "dist\image-viewer-${{ needs.changelog.outputs.version }}-${{ matrix.name }}\"
        }
        cd dist
        ${{ matrix.archive_cmd }} ..\image-viewer-${{ needs.changelog.outputs.version }}-${{ matrix.name }}.${{ matrix.archive_ext }} image-viewer-${{ needs.changelog.outputs.version }}-${{ matrix.name }}\
    
    - name: Create .app bundle and DMG (macOS)
      if: runner.os == 'macOS'
      run: |
        VERSION="${{ needs.changelog.outputs.version }}"
        APP_NAME="Image Viewer"
        APP_BUNDLE="Image Viewer.app"
        
        # 1. 创建 .app bundle 结构
        mkdir -p "$APP_BUNDLE/Contents/MacOS"
        mkdir -p "$APP_BUNDLE/Contents/Resources"
        
        # 2. 复制二进制文件到 MacOS/ 目录
        cp "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "$APP_BUNDLE/Contents/MacOS/"
        chmod +x "$APP_BUNDLE/Contents/MacOS/${{ matrix.binary_name }}"
        
        # 3. 创建 Info.plist
        cat > "$APP_BUNDLE/Contents/Info.plist" << EOF
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>CFBundleName</key>
            <string>Image Viewer</string>
            <key>CFBundleDisplayName</key>
            <string>Image Viewer</string>
            <key>CFBundleIdentifier</key>
            <string>com.imageviewer.app</string>
            <key>CFBundleVersion</key>
            <string>$VERSION</string>
            <key>CFBundleShortVersionString</key>
            <string>$VERSION</string>
            <key>CFBundleExecutable</key>
            <string>${{ matrix.binary_name }}</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleSupportedPlatforms</key>
            <array>
                <string>MacOSX</string>
            </array>
            <key>LSMinimumSystemVersion</key>
            <string>10.11</string>
            <key>LSUIElement</key>
            <false/>
        </dict>
        </plist>
        EOF
        
        # 4. 复制图标（如果有 icon.icns）
        if [ -f "assets/icon.icns" ]; then
          cp assets/icon.icns "$APP_BUNDLE/Contents/Resources/"
        fi
        
        # 5. 创建 PkgInfo
        echo "APPL????" > "$APP_BUNDLE/Contents/PkgInfo"
        
        # 6. 创建 DMG 布局目录
        mkdir -p dist/dmg_staging
        cp -r "$APP_BUNDLE" dist/dmg_staging/
        
        # 7. 创建 Applications 软链接
        ln -s /Applications dist/dmg_staging/Applications
        
        # 8. 复制 README 和 LICENSE（可选）
        cp README.md LICENSE dist/dmg_staging/ 2>/dev/null || true
        
        # 9. 使用 create-dmg 创建 DMG
        if command -v create-dmg &> /dev/null; then
          create-dmg \
            --volname "$APP_NAME $VERSION" \
            --window-size 800 400 \
            --icon-size 100 \
            --app-drop-link 600 185 \
            --icon "$APP_BUNDLE" 200 185 \
            --eula LICENSE \
            "image-viewer-${VERSION}-${{ matrix.name }}.dmg" \
            dist/dmg_staging/
        else
          # 备选：使用 hdiutil
          hdiutil create -volname "$APP_NAME $VERSION" \
            -srcfolder dist/dmg_staging \
            -ov -format UDZO \
            "image-viewer-${VERSION}-${{ matrix.name }}.dmg"
        fi
        
        echo "✅ DMG created: image-viewer-${VERSION}-${{ matrix.name }}.dmg"
      continue-on-error: true
    
    - name: Create AppImage (Linux x86_64)
      if: matrix.target == 'x86_64-unknown-linux-gnu'
      run: |
        # 安装 linuxdeploy 和 appimagetool
        wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage -O linuxdeploy.AppImage
        chmod +x linuxdeploy.AppImage
        
        # 创建 AppDir 结构
        mkdir -p AppDir/usr/bin
        mkdir -p AppDir/usr/share/applications
        mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
        
        # 复制二进制文件
        cp target/${{ matrix.target }}/release/${{ matrix.binary_name }} AppDir/usr/bin/
        
        # 创建 .desktop 文件
        cat > AppDir/usr/share/applications/image-viewer.desktop << 'EOF'
        [Desktop Entry]
        Name=Image Viewer
        Exec=image-viewer
        Icon=image-viewer
        Type=Application
        Categories=Graphics;Viewer;
        Comment=Simple and fast image viewer
        EOF
        
        # 复制图标（如果有）或使用默认
        touch AppDir/usr/share/icons/hicolor/256x256/apps/image-viewer.png
        
        # 创建 AppRun 链接
        ln -s usr/bin/image-viewer AppDir/AppRun
        
        # 构建 AppImage
        ./linuxdeploy.AppImage --appdir AppDir --output appimage
        
        # 重命名 AppImage
        mv Image_Viewer*.AppImage image-viewer-${{ needs.changelog.outputs.version }}-linux-x86_64.AppImage || \
        mv *.AppImage image-viewer-${{ needs.changelog.outputs.version }}-linux-x86_64.AppImage
      continue-on-error: true
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: image-viewer-${{ matrix.name }}
        path: |
          image-viewer-${{ needs.changelog.outputs.version }}-${{ matrix.name }}.${{ matrix.archive_ext }}
          image-viewer-${{ needs.changelog.outputs.version }}-linux-x86_64.AppImage
          *.dmg

  build-msi:
    name: Build MSI (Windows)
    needs: changelog
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
    
    - name: Cache cargo
      uses: Swatinem/rust-cache@v2
    
    - name: Install WiX Toolset
      run: |
        choco install wixtoolset
        echo "C:\\Program Files (x86)\\WiX Toolset v3.11\\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
    
    - name: Install cargo-wix
      run: cargo install cargo-wix
    
    - name: Fetch dependencies
      run: cargo fetch
    
    - name: Build Windows binary first
      run: cargo build --release
    
    - name: Build MSI
      shell: pwsh
      run: |
        if (-not (Test-Path "wix")) {
          New-Item -ItemType Directory -Path "wix"
        }
        if (-not (Test-Path "wix\main.wxs")) {
          cargo wix init --force
        }
        cargo wix --output target/wix/image-viewer.msi --nocapture
      continue-on-error: true
    
    - name: Upload MSI
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: image-viewer-windows-msi
        path: target/wix/image-viewer.msi

  create-release:
    name: Create GitHub Release
    needs: [changelog, build-release, build-msi]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
        merge-multiple: true
    
    - name: List artifacts
      run: ls -la artifacts/
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        name: Image Viewer ${{ needs.changelog.outputs.version }}
        body: ${{ needs.changelog.outputs.release_body }}
        files: artifacts/*
        draft: false
        prerelease: ${{ contains(needs.changelog.outputs.version, '-') }}
        generate_release_notes: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
