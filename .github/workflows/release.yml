name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

env:
  CARGO_TERM_COLOR: always
  CARGO_NET_RETRY: 10

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changelog:
    name: Generate Changelog
    runs-on: ubuntu-latest
    outputs:
      release_body: ${{ steps.changelog.outputs.release_body }}
      version: ${{ steps.version.outputs.version }}
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Get version from tag
      id: version
      run: |
        VERSION=${GITHUB_REF#refs/tags/}
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Version: $VERSION"
    
    - name: Generate changelog
      id: changelog
      run: |
        export VERSION="${{ steps.version.outputs.version }}"
        python3 scripts/generate_changelog.py > RELEASE_NOTES.md
        cat RELEASE_NOTES.md
        echo "release_body<<EOF" >> $GITHUB_OUTPUT
        cat RELEASE_NOTES.md >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

  build-release:
    name: Build Release (${{ matrix.name }})
    needs: changelog
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            name: linux-x86_64
            binary_name: image-viewer
            archive_ext: tar.gz
            archive_cmd: tar czvf
          
          - os: ubuntu-24.04-arm  # ARM64 原生 runner (GitHub beta)
            target: aarch64-unknown-linux-gnu
            name: linux-aarch64
            binary_name: image-viewer
            archive_ext: tar.gz
            archive_cmd: tar czvf
          
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: windows-x86_64
            binary_name: image-viewer.exe
            archive_ext: zip
            archive_cmd: 7z a
          
          - os: macos-latest
            target: x86_64-apple-darwin
            name: macos-x86_64
            binary_name: image-viewer
            archive_ext: tar.gz
            archive_cmd: tar czvf
          
          - os: macos-latest
            target: aarch64-apple-darwin
            name: macos-aarch64
            binary_name: image-viewer
            archive_ext: tar.gz
            archive_cmd: tar czvf

    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}
    
    - name: Install zig
      if: matrix.target == 'aarch64-unknown-linux-gnu'
      uses: goto-bus-stop/setup-zig@v2
      with:
        version: 0.11.0
    
    - name: Install cargo-zigbuild
      if: matrix.target == 'aarch64-unknown-linux-gnu'
      run: cargo install --locked cargo-zigbuild
    
    # ARM64 依赖由 Cross.toml 中指定的镜像提供
    
    - name: Install system dependencies (Ubuntu x86_64)
      if: runner.os == 'Linux' && matrix.target == 'x86_64-unknown-linux-gnu'
      run: |
        sudo apt-get update
        sudo apt-get install -y libgtk-3-dev libxcb-render0-dev libxcb-shape0-dev \
          libxcb-xfixes0-dev libxkbcommon-dev libssl-dev libxkbcommon-x11-dev \
          libfontconfig1-dev libfreetype6-dev libxcb1-dev libxrandr-dev \
          libxi-dev libxcursor-dev libx11-dev
    
    # cross 会通过 Cross.toml 自动安装 ARM64 依赖
    # - name: Install system dependencies (Ubuntu ARM64)
    #   if: matrix.target == 'aarch64-unknown-linux-gnu'
    #   run: echo "Dependencies handled by cross"
    
    - name: Install macOS dependencies
      if: runner.os == 'macOS'
      run: |
        brew install create-dmg || true
        xcode-select --print-path || xcode-select --install || true
    
    - name: Cache cargo
      uses: Swatinem/rust-cache@v2
      with:
        shared-key: "release-${{ matrix.target }}"
    
    - name: Fetch dependencies
      run: cargo fetch
    
    - name: Build release (x86_64 Linux/macOS/Windows)
      if: matrix.target != 'aarch64-unknown-linux-gnu'
      env:
        RUSTFLAGS: ${{ matrix.os == 'windows-latest' && '-C target-feature=+crt-static' || '' }}
      run: cargo build --release --target ${{ matrix.target }}
    
    - name: Install dependencies (ARM64 native)
      if: matrix.target == 'aarch64-unknown-linux-gnu'
      run: |
        sudo apt-get update
        sudo apt-get install -y libgtk-3-dev libfontconfig1-dev pkg-config
    
    - name: Build release (ARM64 Linux native)
      if: matrix.target == 'aarch64-unknown-linux-gnu'
      run: cargo build --release --target ${{ matrix.target }}
    
    - name: Package (Linux/Unix)
      if: matrix.archive_ext == 'tar.gz'
      run: |
        mkdir -p dist/image-viewer-${{ needs.changelog.outputs.version }}-${{ matrix.name }}
        cp target/${{ matrix.target }}/release/${{ matrix.binary_name }} dist/image-viewer-${{ needs.changelog.outputs.version }}-${{ matrix.name }}/
        cp README.md LICENSE dist/image-viewer-${{ needs.changelog.outputs.version }}-${{ matrix.name }}/
        # Copy install scripts
        if [ -d "install" ]; then
          cp -r install dist/image-viewer-${{ needs.changelog.outputs.version }}-${{ matrix.name }}/
        fi
        cd dist
        ${{ matrix.archive_cmd }} ../image-viewer-${{ needs.changelog.outputs.version }}-${{ matrix.name }}.${{ matrix.archive_ext }} image-viewer-${{ needs.changelog.outputs.version }}-${{ matrix.name }}/
    
    - name: Package (Windows)
      if: matrix.archive_ext == 'zip'
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path "dist\image-viewer-${{ needs.changelog.outputs.version }}-${{ matrix.name }}"
        Copy-Item "target\${{ matrix.target }}\release\${{ matrix.binary_name }}" "dist\image-viewer-${{ needs.changelog.outputs.version }}-${{ matrix.name }}\"
        Copy-Item "README.md" "dist\image-viewer-${{ needs.changelog.outputs.version }}-${{ matrix.name }}\"
        Copy-Item "LICENSE" "dist\image-viewer-${{ needs.changelog.outputs.version }}-${{ matrix.name }}\"
        # Copy install scripts
        if (Test-Path "install") {
          Copy-Item -Recurse -Path "install" -Destination "dist\image-viewer-${{ needs.changelog.outputs.version }}-${{ matrix.name }}\"
        }
        cd dist
        ${{ matrix.archive_cmd }} ..\image-viewer-${{ needs.changelog.outputs.version }}-${{ matrix.name }}.${{ matrix.archive_ext }} image-viewer-${{ needs.changelog.outputs.version }}-${{ matrix.name }}\
    
    - name: Create DMG (macOS)
      if: runner.os == 'macOS'
      run: |
        mkdir -p dist/dmg
        cp target/${{ matrix.target }}/release/${{ matrix.binary_name }} dist/dmg/
        cp README.md LICENSE dist/dmg/
        create-dmg \
          --volname "Image Viewer ${{ needs.changelog.outputs.version }}" \
          --window-size 800 400 \
          --icon-size 100 \
          "image-viewer-${{ needs.changelog.outputs.version }}-${{ matrix.name }}.dmg" \
          dist/dmg/ 2>/dev/null || echo "DMG creation skipped"
      continue-on-error: true
    
    - name: Create AppImage (Linux x86_64)
      if: matrix.target == 'x86_64-unknown-linux-gnu'
      run: |
        # 安装 linuxdeploy 和 appimagetool
        wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage -O linuxdeploy.AppImage
        chmod +x linuxdeploy.AppImage
        
        # 创建 AppDir 结构
        mkdir -p AppDir/usr/bin
        mkdir -p AppDir/usr/share/applications
        mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
        
        # 复制二进制文件
        cp target/${{ matrix.target }}/release/${{ matrix.binary_name }} AppDir/usr/bin/
        
        # 创建 .desktop 文件
        cat > AppDir/usr/share/applications/image-viewer.desktop << 'EOF'
        [Desktop Entry]
        Name=Image Viewer
        Exec=image-viewer
        Icon=image-viewer
        Type=Application
        Categories=Graphics;Viewer;
        Comment=Simple and fast image viewer
        EOF
        
        # 复制图标（如果有）或使用默认
        touch AppDir/usr/share/icons/hicolor/256x256/apps/image-viewer.png
        
        # 创建 AppRun 链接
        ln -s usr/bin/image-viewer AppDir/AppRun
        
        # 构建 AppImage
        ./linuxdeploy.AppImage --appdir AppDir --output appimage
        
        # 重命名 AppImage
        mv Image_Viewer*.AppImage image-viewer-${{ needs.changelog.outputs.version }}-linux-x86_64.AppImage || \
        mv *.AppImage image-viewer-${{ needs.changelog.outputs.version }}-linux-x86_64.AppImage
      continue-on-error: true
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: image-viewer-${{ matrix.name }}
        path: |
          image-viewer-${{ needs.changelog.outputs.version }}-${{ matrix.name }}.${{ matrix.archive_ext }}
          image-viewer-${{ needs.changelog.outputs.version }}-linux-x86_64.AppImage
          *.dmg

  build-msi:
    name: Build MSI (Windows)
    needs: changelog
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
    
    - name: Cache cargo
      uses: Swatinem/rust-cache@v2
    
    - name: Install WiX Toolset
      run: |
        choco install wixtoolset
        echo "C:\\Program Files (x86)\\WiX Toolset v3.11\\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
    
    - name: Install cargo-wix
      run: cargo install cargo-wix
    
    - name: Fetch dependencies
      run: cargo fetch
    
    - name: Build Windows binary first
      run: cargo build --release
    
    - name: Build MSI
      shell: pwsh
      run: |
        if (-not (Test-Path "wix")) {
          New-Item -ItemType Directory -Path "wix"
        }
        if (-not (Test-Path "wix\main.wxs")) {
          cargo wix init --force
        }
        cargo wix --output target/wix/image-viewer.msi --nocapture
      continue-on-error: true
    
    - name: Upload MSI
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: image-viewer-windows-msi
        path: target/wix/image-viewer.msi

  create-release:
    name: Create GitHub Release
    needs: [changelog, build-release, build-msi]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
        merge-multiple: true
    
    - name: List artifacts
      run: ls -la artifacts/
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        name: Image Viewer ${{ needs.changelog.outputs.version }}
        body: ${{ needs.changelog.outputs.release_body }}
        files: artifacts/*
        draft: false
        prerelease: ${{ contains(needs.changelog.outputs.version, '-') }}
        generate_release_notes: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
